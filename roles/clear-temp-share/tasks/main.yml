- name: Copy templates
  ansible.builtin.import_tasks: copy-templates.yml
  vars:
    directory: ../templates
    target: "{{ clear_temp_share_root }}"
    files:
      clear-temp-share.j2:
        owner: 0
        group: 0
        mode: "700"

- name: Install systemd units
  ansible.builtin.import_tasks: systemd-install-units.yml
  vars:
    directory: "{{ clear_temp_share_root }}/systemd"
    local_units: templates/systemd

- name: Start systemd unit
  ansible.builtin.systemd:
    state: started
    enabled: true
    name: clear-temp-share.timer
    daemon_reload: true
  register: clear_temp_share_started
