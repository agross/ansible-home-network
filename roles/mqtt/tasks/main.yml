- name: Collect MQTT accounts for site {{ site }}
  ansible.builtin.set_fact:
    mqtt_accounts: >-
      {{
        mqtt_accounts |
        default({}) |
        ansible.builtin.combine(hostvars[item].mqtt_accounts | default({}))
      }}
  loop: "{{ groups[site] | default([]) }}"

- name: Copy templates
  ansible.builtin.import_tasks:
    file: copy-templates.yml
  vars:
    directory: ../templates
    target: "{{ mqtt_root }}"
    notify_: Restart mqtt service
    files:
      mosquitto/mosquitto.conf.j2:
        owner: 1883
        group: 1883
      mosquitto/auth.j2:
        owner: 1883
        group: 1883
        mode: "640"
      systemd/mqtt.service.j2:
        owner: 0
        group: 0
        mode: "640"

- name: Update docker-compose images
  ansible.builtin.import_tasks:
    file: docker-compose-update.yml
  vars:
    directory: "{{ mqtt_root }}"
    pull: true
    build: true
    notify_: Restart mqtt service

- name: Restore from backup if requested
  when: restore is defined
  ansible.builtin.import_tasks:
    file: restore.yml
  vars:
    restore_target_dir: "{{ mqtt_root }}"

- name: Symlink backup configuration
  ansible.builtin.file:
    state: link
    src: "{{ mqtt_root }}/backup.yaml"
    path: /etc/borgmatic.d/{{ ansible_role_name }}.yaml

- name: Install systemd units
  ansible.builtin.import_tasks: systemd-install-units.yml
  vars:
    directory: "{{ mqtt_root }}/systemd"
    local_units: templates/systemd
    notify_: Restart mqtt service

- name: Start systemd units
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ systemd_units_autostart }}"
  register: mqtt_started
