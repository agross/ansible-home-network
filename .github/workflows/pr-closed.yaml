name: PR closed

on:
  pull_request:
    types:
      - closed
  push:
    branches:
      - master

jobs:
  affected-roles:
    name: Determine affected roles
    runs-on: ubuntu-latest

    # Renovate triggers branch automerge pushes committed by GitHub. Rebased PR
    # pushes are triggered and committed by the user who merged the PR.
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        !contains(github.event.pull_request.labels.*.name, 'skip-ansible')
      ) || (
        github.event_name == 'push' &&
        github.actor == 'agross-renovate[bot]' &&
        github.event.head_commit.committer.name == 'GitHub' &&
        github.event.head_commit.committer.email == 'noreply@github.com'
      )

    env:
      EVENT_NAME: ${{ github.event_name }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      PUSH_BASE_SHA: ${{ github.event.before }}
      PUSH_HEAD_SHA: ${{ github.event.after }}

    outputs:
      roles: ${{ steps.affected-roles.outputs.roles }}

    steps:
      - name: Get full commit history
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          # We don't need the file contents (blobs), but we inspect commits and
          # trees.
          # This in combination with a bare repo would be even faster, but it's
          # not supported.
          # https://github.com/actions/checkout/issues/603
          filter: blob:none

      - name: Download original PR branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$PR_HEAD_SHA"

      # If merging the PR caused a rebase (because new commits have been added
      # to the PR target branch before the PR was merged):
      # The pull_request.base.sha points to PR target branch commit before the
      # rebase. The pull_request.head.sha denotes the last commit on the
      # PR branch before the PR was rebased.
      - name: Compute base commit
        id: base-commit
        run: |
          {
            echo 'sha<<SHA'

            if [[ "$EVENT_NAME" == pull_request ]]; then
              echo "pull_request.base.sha=$PR_BASE_SHA" >&2
              echo "pull_request.merge_commit_sha=$PR_MERGE_SHA" >&2
              echo "pull_request.head.sha=$PR_HEAD_SHA" >&2

              git merge-base "$PR_MERGE_SHA" "$PR_HEAD_SHA"
            else
              echo "push.before=$PUSH_BASE_SHA" >&2
              echo "push.after=$PUSH_HEAD_SHA" >&2

              echo "$PUSH_BASE_SHA"
            fi

            echo SHA
          } >> "$GITHUB_OUTPUT"

      - name: Show affected files
        run: |
          git diff --name-status "$CHANGE_BASE_SHA..$CHANGE_HEAD_SHA"
        env:
          CHANGE_BASE_SHA: ${{ steps.base-commit.outputs.sha }}
          CHANGE_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}

      - name: Determine roles from affected files
        id: affected-roles
        run: |
          {
            echo 'roles<<ROLES'

            git diff \
                --name-only \
                "$CHANGE_BASE_SHA..$CHANGE_HEAD_SHA" \
                -- \
                host_vars \
                group_vars \
                roles |
            sed -e 's|.*_vars/.*/\([^.]*\).*|\1|' -e 's|roles/\([^/]*\)/.*|\1|' |
            sort |
            uniq |
            paste --serial --delimiter=,

            echo ROLES
          } >> "$GITHUB_OUTPUT"
        env:
          CHANGE_BASE_SHA: ${{ steps.base-commit.outputs.sha }}
          CHANGE_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}

      - name: Show roles
        run: |
          printf 'Roles affected by the change: %s\n' "$ROLES"
        env:
          ROLES: ${{ steps.affected-roles.outputs.roles }}

  run-ansible:
    name: Run Ansible with tags ${{ needs.affected-roles.outputs.roles }}

    needs: affected-roles

    if: needs.affected-roles.outputs.roles != ''

    uses: ./.github/workflows/ansible.yaml
    with:
      tags: ${{ needs.affected-roles.outputs.roles }}
    secrets: inherit
