proxmox:
  host: pve-home
  type: kvm
  id: "{{ github_runner_proxmox_vm_id }}"
  tags: "{{ github_runner_proxmox_vm_tags | default(['gw']) }}"
  cores: 8
  memory: 10240
  net:
    net0: virtio,bridge=vmbr0,firewall=1
  efi_disk:
    storage: local-zfs
  scsi:
    scsi0:
      storage: local-zfs
      size: 100
      discard: true
      iothread: true
      ssd: true
