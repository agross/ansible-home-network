proxmox:
  host: pve-ogd
  type: kvm
  id: 102
  tags:
    - net
  startup: order=100
  cores: 4
  memory: 2048
  net:
    net0: virtio,bridge=vmbr0,firewall=1
    net1: virtio,bridge=vmbr1,firewall=1
  efi_disk:
    storage: local-zfs
  scsi:
    scsi0:
      storage: local-lvm
      size: 15
      discard: true
      iothread: true
      ssd: true
